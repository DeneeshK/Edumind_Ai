global:
  scrape_interval: 15s       # How often Prometheus polls /metrics
  evaluation_interval: 15s   # How often rules are evaluated
  scrape_timeout: 10s

scrape_configs:
  - job_name: "edumind_backend"
    static_configs:
      - targets: ["host.docker.internal:8000"]   # Change to your backend host:port
    metrics_path: "/metrics"
    scrape_interval: 15s

  # If running inside Docker compose with service name "backend":
  # - job_name: "edumind_backend"
  #   static_configs:
  #     - targets: ["backend:8000"]
