[pytest]
asyncio_mode = auto
testpaths =
    tests/unit
    tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
pythonpath = .
markers =
    unit: fast unit tests that do not touch external services
    integration: lightweight API tests with mocked dependencies
filterwarnings =
    ignore:Please use `import python_multipart` instead.:PendingDeprecationWarning
