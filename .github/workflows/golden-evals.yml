name: Golden Evals

# Prompt-regression gate. Runs the golden suite (real Groq API) whenever a prompt
# or a prompt-bearing live file changes. Separate from backend-ci.yml because these
# cases need a real GROQ_API_KEY — the main test job runs with fake keys.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "prompts/**"
      - "agents/curriculum_architect.py"
      - "agents/evaluation_agent.py"
      - "core/course_service.py"
      - "evaluation/golden/**"
      - ".github/workflows/golden-evals.yml"

permissions:
  contents: read

jobs:
  golden:
    name: Golden regression suite
    runs-on: ubuntu-latest
    # The runner paces cases to stay under the 8K-TPM reasoning-model limit
    # (curriculum=45s, diagnosis/lesson=5s between cases) and retries a rate-limited
    # case once after 90s. A full run is ~15–20 min; this timeout leaves headroom.
    timeout-minutes: 40
    env:
      # Config requires these to import; golden runs never touch the DB (metric
      # persistence is disabled in the runner), so a dummy URL is fine.
      ENVIRONMENT: test
      DATABASE_URL: postgresql://test:test@localhost:5432/test_edumind
      TAVILY_API_KEY: test-tavily-key
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
      SESSION_SECRET_KEY: test-session-secret
      SESSION_COOKIE_NAME: edumind_test_session
      EDUMIND_API_KEY: test-edumind-api-key
      CHROMADB_PATH: /tmp/edumind-ci-chromadb
      EVAL_ENABLED: "false"
      DB_POOL_SIZE: "5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for GROQ_API_KEY
        id: guard
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Golden evals skipped::GROQ_API_KEY secret is unavailable (e.g. a fork PR). Skipping the golden regression suite."
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.has_key == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.has_key == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run golden suite
        if: steps.guard.outputs.has_key == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m evaluation.golden.run_golden \
            --suite all \
            --report evaluation/golden/reports/golden_report.json

      - name: Upload report
        if: steps.guard.outputs.has_key == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-eval-report
          path: |
            evaluation/golden/reports/golden_report.json
            evaluation/golden/reports/golden_report.md
          if-no-files-found: warn
